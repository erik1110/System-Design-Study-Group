name: Keep Alive

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Update heartbeat
        run: |
          date > heartbeat.txt
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add heartbeat.txt
          git commit -m "Keep-alive: Cron heartbeat"
          git push
