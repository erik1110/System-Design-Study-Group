name: Meeting Reminder
on:
  schedule:
    - cron: '45 12 * * 5'   # 12:45 UTC = 20:45 Taiwan time, fires ~15 min early
  workflow_dispatch:

jobs:
  send_discord_message:
    runs-on: ubuntu-latest
    steps:
      - name: Send Weekly Meeting Reminder to Discord
        shell: python
        run: |
          import urllib.request
          import json
          import os
          from datetime import datetime, timezone

          # Determine UK time — BST (UTC+1) runs March to October
          month = datetime.now(timezone.utc).month
          if 3 <= month <= 10:
              uk_time = "22:00 BST (UTC+1)"
          else:
              uk_time = "21:00 GMT (UTC+0)"

          message = (
              "📢 **Weekly Meeting Reminder!**\n"
              "@everyone\n"
              "Tonight's weekly meeting starts at:\n"
              "🇹🇼 Taiwan: 21:00 TST (UTC+8)\n"
              "🇯🇵 Japan: 22:00 JST (UTC+9)\n"
              f"🇬🇧 UK: {uk_time}\n"
              "Please be on time! 🙏"
          )

          payload = json.dumps({
              "username": "Pikachu Assistant",
              "content": message,
              "allowed_mentions": {"parse": ["everyone"]}
          }).encode("utf-8")

          req = urllib.request.Request(
              "${{ secrets.DISCORD_WEBHOOK_URL }}",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST"
          )
          urllib.request.urlopen(req)
